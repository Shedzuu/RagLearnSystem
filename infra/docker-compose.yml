name: test

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${PROD_POSTGRES_DB}
      POSTGRES_USER: ${PROD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
    volumes:
      - diploma_pg_data:/var/lib/postgresql/data
    ports:
      # Открываем Postgres наружу на 5433
      - "5433:5432"

  backend:
    image: ghcr.io/${GHCR_OWNER}/raglearn-backend:${APP_IMAGE_TAG}
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend:/app
      - backend_media:/app/media
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      # Django
      SECRET_KEY: ${PROD_JWT_SECRET_KEY}
      DEBUG: "0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,${DEPLOY_HOST}"

      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${PROD_POSTGRES_DB}
      DB_USER: ${PROD_POSTGRES_USER}
      DB_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432

      # CORS (фронт на том же хосте)
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://${DEPLOY_HOST}:5173"
      GOOGLE_OAUTH_CLIENT_ID: ${PROD_GOOGLE_OAUTH_CLIENT_ID}

      # LLM (OpenRouter)
      LLM_API_KEY: ${PROD_LLM_API_KEY}
      LLM_BASE_URL: ${PROD_LLM_BASE_URL}
      LLM_MODEL: ${PROD_LLM_MODEL}
      # Async generation
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GENERATE_PLAN_SYNC: "0"

    depends_on:
      - db
      - redis

  worker:
    image: ghcr.io/${GHCR_OWNER}/raglearn-backend:${APP_IMAGE_TAG}
    command: celery -A config worker -l info
    restart: unless-stopped
    volumes:
      - ../backend:/app
      - backend_media:/app/media
      - hf_cache:/root/.cache/huggingface
    environment:
      # Django
      SECRET_KEY: ${PROD_JWT_SECRET_KEY}
      DEBUG: "0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,${DEPLOY_HOST}"

      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${PROD_POSTGRES_DB}
      DB_USER: ${PROD_POSTGRES_USER}
      DB_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432

      # LLM (OpenRouter)
      LLM_API_KEY: ${PROD_LLM_API_KEY}
      LLM_BASE_URL: ${PROD_LLM_BASE_URL}
      LLM_MODEL: ${PROD_LLM_MODEL}

      # Async generation
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    image: ghcr.io/${GHCR_OWNER}/raglearn-frontend:${APP_IMAGE_TAG}
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: production
      VITE_GOOGLE_CLIENT_ID: ${PROD_GOOGLE_OAUTH_CLIENT_ID}
      # Фронт ходит в backend по имени сервиса внутри сети
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  diploma_pg_data:
  backend_media:
  hf_cache:

