name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 212.134.241.141 >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p 2222" ./ \
            mluser@212.134.241.141:/home/mluser/test

      - name: Build deployment images on GitHub runner
        run: |
          docker pull redis:7-alpine
          docker pull pgvector/pgvector:pg15
          docker build -t test-app:${{ github.sha }} ./backend
          docker build -t test-frontend:${{ github.sha }} ./frontend

      - name: Upload Docker images to server
        run: |
          docker save redis:7-alpine pgvector/pgvector:pg15 test-app:${{ github.sha }} test-frontend:${{ github.sha }} | \
            ssh -i ~/.ssh/deploy_key -p 2222 mluser@212.134.241.141 "docker load"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 mluser@212.134.241.141 << EOF
            set -e
            export PROD_POSTGRES_DB='${{ secrets.PROD_POSTGRES_DB }}'
            export PROD_POSTGRES_USER='${{ secrets.PROD_POSTGRES_USER }}'
            export PROD_POSTGRES_PASSWORD='${{ secrets.PROD_POSTGRES_PASSWORD }}'
            export PROD_JWT_SECRET_KEY='${{ secrets.PROD_JWT_SECRET_KEY }}'
            export PROD_GOOGLE_OAUTH_CLIENT_ID='${{ secrets.PROD_GOOGLE_OAUTH_CLIENT_ID }}'
            export PROD_LLM_API_KEY='${{ secrets.PROD_LLM_API_KEY }}'
            export PROD_LLM_BASE_URL='${{ secrets.PROD_LLM_BASE_URL }}'
            export PROD_LLM_MODEL='${{ secrets.PROD_LLM_MODEL }}'
            export DEPLOY_HOST='${{ secrets.DEPLOY_HOST }}'
            export APP_IMAGE_TAG='${{ github.sha }}'
            cd ~/test/infra
            for attempt in 1 2 3; do
              if docker compose -p test -f docker-compose.yml up -d --no-build; then
                exit 0
              fi
              echo "Docker Compose deploy failed on attempt \$attempt, retrying in 15 seconds..."
              sleep 15
            done
            echo "Docker Compose deploy failed after 3 attempts."
            exit 1
          EOF

