name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p 2222" ./ \
            mluser@${{ secrets.DEPLOY_HOST }}:/home/mluser/test

      - name: Build deployment images on GitHub runner
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/raglearn-backend:${{ github.sha }} ./backend
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/raglearn-frontend:${{ github.sha }} ./frontend

      - name: Push deployment images to GHCR
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/raglearn-backend:${{ github.sha }}
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/raglearn-frontend:${{ github.sha }}

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 mluser@${{ secrets.DEPLOY_HOST }} << EOF
            set -e
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
            export PROD_POSTGRES_DB='${{ secrets.PROD_POSTGRES_DB }}'
            export PROD_POSTGRES_USER='${{ secrets.PROD_POSTGRES_USER }}'
            export PROD_POSTGRES_PASSWORD='${{ secrets.PROD_POSTGRES_PASSWORD }}'
            export PROD_JWT_SECRET_KEY='${{ secrets.PROD_JWT_SECRET_KEY }}'
            export PROD_GOOGLE_OAUTH_CLIENT_ID='${{ secrets.PROD_GOOGLE_OAUTH_CLIENT_ID }}'
            export PROD_LLM_API_KEY='${{ secrets.PROD_LLM_API_KEY }}'
            export PROD_LLM_BASE_URL='${{ secrets.PROD_LLM_BASE_URL }}'
            export PROD_LLM_MODEL='${{ secrets.PROD_LLM_MODEL }}'
            export DEPLOY_HOST='${{ secrets.DEPLOY_HOST }}'
            export GHCR_OWNER='${{ secrets.GHCR_USERNAME }}'
            export APP_IMAGE_TAG='${{ github.sha }}'
            cd ~/test/infra
            for attempt in 1 2 3; do
              if docker compose -p test -f docker-compose.yml pull && docker compose -p test -f docker-compose.yml up -d; then
                exit 0
              fi
              echo "Docker Compose deploy failed on attempt \$attempt, retrying in 15 seconds..."
              sleep 15
            done
            echo "Docker Compose deploy failed after 3 attempts."
            exit 1
          EOF
